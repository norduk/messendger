<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureMessenger — Admin</title>
<style>
:root{--bg-3:#1e1f22;--bg-2:#2b2d31;--bg-1:#313338;--bg-in:#1e1f22;--bg-hv:#35373c;--bg-ac:#404249;--bg-ov:rgba(0,0,0,.7);--bg-cd:#2b2d31;--bg-th:rgba(88,101,242,.06);--ac:#5865f2;--ac-h:#4752c4;--ac-g:rgba(88,101,242,.25);--tx:#dbdee1;--tx-m:#949ba4;--tx-f:#80848e;--gr:#23a55a;--yl:#f0b232;--rd:#f23f43;--bd:#3f4147;--bd-s:#4e5058;--fn:"Segoe UI",system-ui,sans-serif;--mn:"JetBrains Mono",monospace;--r:4px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}body{font-family:var(--fn);font-size:14px;color:var(--tx);background:var(--bg-3);-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;cursor:pointer;outline:none;background:transparent}
input,select,textarea{font-family:inherit;border:none;outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:3px}
.admin{display:flex;height:100vh}
.sidebar{width:240px;background:var(--bg-2);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-hdr{padding:20px 16px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:10px}
.sidebar-logo{width:36px;height:36px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-title{font-size:15px;font-weight:700;color:#fff}
.sidebar-sub{font-size:11px;color:var(--tx-f)}
.sidebar-nav{flex:1;padding:8px}
.nav-lbl{font-size:11px;font-weight:700;color:var(--tx-f);text-transform:uppercase;padding:12px 12px 4px;letter-spacing:.05em}
.nav-sep{height:1px;background:var(--bd);margin:4px 12px}
.nav-i{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);font-size:14px;color:var(--tx-m);width:100%;text-align:left;transition:.15s}
.nav-i:hover{background:var(--bg-hv);color:var(--tx)}.nav-i.on{background:var(--bg-ac);color:#fff}
.nav-i svg{width:18px;height:18px;opacity:.7;flex-shrink:0}.nav-i.on svg{opacity:1}
.nav-i.danger{color:var(--rd)}.nav-i.danger:hover{background:rgba(242,63,67,.1)}
.sidebar-ft{padding:12px 16px;border-top:1px solid var(--bd);font-size:11px;color:#6d6f78;text-align:center}
.content{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg-1)}
.pg-t{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.pg-d{font-size:13px;color:var(--tx-f);margin-bottom:24px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--bg-cd);border-radius:8px;padding:18px 20px;border:1px solid var(--bd);transition:.2s}
.sc:hover{border-color:var(--bd-s)}
.sc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-l{font-size:11px;font-weight:700;color:var(--tx-f);text-transform:uppercase}
.sc-i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sc-i svg{width:16px;height:16px}
.sc-v{font-size:28px;font-weight:700;color:#fff;font-family:var(--mn);line-height:1.1}
.sc-s{font-size:12px;color:var(--tx-f);margin-top:4px;font-family:var(--mn)}
.card{background:var(--bg-cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:20px;overflow:hidden}
.card-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-h h3{font-size:14px;font-weight:700;color:#fff}
.card-b{padding:16px 20px}.card-b.np{padding:0}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--tx-f);text-transform:uppercase;text-align:left;padding:10px 16px;border-bottom:2px solid var(--bd)}
.tbl td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:hover td{background:var(--bg-th)}.tbl tr:last-child td{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}.dot.on{background:var(--gr)}.dot.off{background:#6d6f78}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.b-g{background:rgba(35,165,90,.15);color:var(--gr)}.b-r{background:rgba(242,63,67,.15);color:var(--rd)}.b-y{background:rgba(240,178,50,.15);color:var(--yl)}.b-m{background:rgba(128,132,142,.15);color:var(--tx-f)}.b-a{background:var(--ac-g);color:var(--ac)}
.ab{width:28px;height:28px;border-radius:var(--r);color:var(--tx-f);display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.ab:hover{background:var(--bg-ac);color:var(--tx)}.ab.danger:hover{background:var(--rd);color:#fff}
.ab svg{width:14px;height:14px}
.ag{display:flex;gap:2px}
.fb{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.fs{flex:1;min-width:200px;padding:8px 12px;background:var(--bg-in);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);font-size:13px;transition:.2s}
.fs::placeholder{color:#6d6f78}.fs:focus{border-color:var(--ac)}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-a{background:var(--ac);color:#fff}.btn-a:hover{background:var(--ac-h)}
.btn-d{background:var(--rd);color:#fff}.btn-d:hover{background:#d83135}
.btn-g{background:var(--bg-hv);color:var(--tx-m)}.btn-g:hover{background:var(--bg-ac);color:var(--tx)}
.btn-s{background:var(--gr);color:#fff}.btn-s:hover{background:#1e9050}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--tx-m);text-transform:uppercase;margin-bottom:6px}
.fi{width:100%;padding:10px 12px;background:var(--bg-in);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);font-size:14px;transition:.2s}
.fi::placeholder{color:#6d6f78}.fi:focus{border-color:var(--ac)}
.tgl{width:40px;height:22px;border-radius:11px;background:var(--bd-s);cursor:pointer;position:relative;transition:.2s;flex-shrink:0;padding:0;appearance:none;-webkit-appearance:none;border:none}
.tgl.on{background:var(--gr)}.tgl::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}.tgl.on::after{transform:translateX(18px)}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd)}.sr:last-child{border-bottom:none}
.si{flex:1}.sn{font-size:14px;color:var(--tx);margin-bottom:2px}.sd{font-size:12px;color:var(--tx-f)}.sc2{flex-shrink:0;margin-left:16px}
.mo{position:fixed;inset:0;background:var(--bg-ov);display:none;align-items:center;justify-content:center;z-index:100}.mo.vis{display:flex}
.ml{background:var(--bg-1);border-radius:8px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 48px rgba(0,0,0,.5);animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.ml-h{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.ml-h h3{font-size:18px;font-weight:700;color:#fff}
.ml-c{background:transparent;color:var(--tx-f);font-size:20px;padding:4px;transition:.15s}.ml-c:hover{color:var(--tx)}
.ml-b{padding:20px 24px}
.ml-f{padding:16px 24px;background:var(--bg-2);border-radius:0 0 8px 8px;display:flex;justify-content:flex-end;gap:8px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.toast.vis{display:flex}.toast.ok{background:var(--gr);color:#fff}.toast.err{background:var(--rd);color:#fff}
.hg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:20px}
.hi{background:var(--bg-cd);border-radius:8px;padding:20px;border:1px solid var(--bd);text-align:center;position:relative;overflow:hidden;transition:.2s}
.hi:hover{transform:translateY(-2px);border-color:var(--bd-s)}
.hi .ico{font-size:32px;margin-bottom:10px}.hi .nm{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px}
.hi .st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.hi.up .st{color:var(--gr)}.hi.dn .st{color:var(--rd)}
.hi .ind{position:absolute;bottom:0;left:0;right:0;height:3px}
.hi.up .ind{background:var(--gr)}.hi.dn .ind{background:var(--rd)}
.auth{position:fixed;inset:0;background:var(--bg-3);display:flex;align-items:center;justify-content:center;z-index:50}
.auth.hid{display:none}
.abox{background:var(--bg-1);border:1px solid var(--bd);border-radius:8px;padding:32px;width:380px}
.abox h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:20px}
.ae{color:var(--rd);font-size:13px;margin-top:10px;min-height:20px}
.hide{display:none!important}
@media(max-width:900px){.sidebar{width:200px}.content{padding:24px 20px}}
@media(max-width:600px){.admin{flex-direction:column}.sidebar{width:100%;max-height:56px;overflow:hidden}.content{padding:16px 12px}.sg{grid-template-columns:1fr 1fr}.modal{width:95vw}}
</style>
</head>
<body>
<div class="auth" id="loginOv">
<div class="abox">
<h2>Admin Login</h2>
<div class="fg"><label class="fl">Username</label><input class="fi" id="loginU" placeholder="admin" autocomplete="username"></div>
<div class="fg"><label class="fl">Password</label><input class="fi" id="loginP" type="password" placeholder="••••••••" autocomplete="current-password"></div>
<button class="btn btn-a" id="loginB" style="width:100%">Sign In</button>
<div class="ae" id="loginE"></div>
</div>
</div>
<div class="admin hide" id="shell">
<div class="sidebar">
<div class="sidebar-hdr"><div class="sidebar-logo">💬</div><div><div class="sidebar-title">Messenger</div><div class="sidebar-sub">Admin Panel</div></div></div>
<nav class="sidebar-nav" id="nav"></nav>
<div class="sidebar-ft">SecureMessenger v1.0</div>
</div>
<div class="content" id="cnt"></div>
</div>
<div class="mo" id="modal"><div class="ml" id="modalIn"></div></div>
<div class="toast" id="toast"></div>
<script>
const P=50,S={sec:'dashboard',tok:sessionStorage.getItem('admin_token')||'',ak:localStorage.getItem('admin_key')||'',up:1};
const AK='ENV_API_KEY',AU='/admin-api';
const ADMIN_API_KEY = AK;
async function api(m,e,b){const o={method:m,headers:{'Content-Type':'application/json','X-Admin-API-Key':ADMIN_API_KEY},credentials:'same-origin'};if(S.ak)o.headers['X-Admin-Key']=S.ak;if(b)o.body=JSON.stringify(b);const r=await fetch(AU+e,o);if(r.status===204)return null;const d=await r.json();if(!r.ok)throw new Error(d.error||r.statusText);return d}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m,t='ok'){const e=document.getElementById('toast');e.className='toast vis '+t;e.textContent=m;clearTimeout(window._tt);window._tt=setTimeout(()=>e.classList.remove('vis'),3000)}
function openM(h){document.getElementById('modalIn').innerHTML=h;document.getElementById('modal').classList.add('vis')}
function closeM(){document.getElementById('modal').classList.remove('vis')}
async function checkAdminKey() {
  if (!S.ak) {
    const path = window.location.pathname;
    const match = path.match(/\/([a-f0-9]{16})\/?/);
    if (match) {
      S.ak = match[1];
      localStorage.setItem('admin_key', S.ak);
    }
  }
  if (S.ak) {
    try {
      const r = await fetch(AU + '/admin/verify-key', {
        headers: { 'X-Admin-Key': S.ak, 'X-Admin-API-Key': ADMIN_API_KEY }
      });
      const d = await r.json();
      if (r.ok && d.valid) {
        sessionStorage.setItem('admin_token', S.ak);
        S.tok = S.ak;
        document.getElementById('loginOv').classList.add('hid');
        document.getElementById('shell').classList.remove('hide');
        rNav();
        rCnt();
        return true;
      }
    } catch(e) {}
  }
  return false;
}
const I={
dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
usr:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',
inv:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/></svg>',
hlt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
log:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
set:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
out:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
edt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
del:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
blk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
};
const NAV=[{s:'Management'},{id:'dashboard',l:'Dashboard',i:I.dash},{id:'users',l:'Users',i:I.usr},{id:'invites',l:'Invites',i:I.inv},{p:1},{s:'System'},{id:'health',l:'Health Check',i:I.hlt},{id:'logs',l:'Action Logs',i:I.log},{p:1},{id:'logout',l:'Sign Out',i:I.out,d:1}];
function rNav(){document.getElementById('nav').innerHTML=NAV.map(n=>{if(n.s)return'<div class="nav-lbl">'+n.s+'</div>';if(n.p)return'<div class="nav-sep"></div>';if(n.id==='logout')return'<button class="nav-i danger" onclick="logout()">'+n.i+'<span>'+n.l+'</span></button>';return'<button class="nav-i '+(S.sec===n.id?'on':'')+'" onclick="go(\''+n.id+'\')">'+n.i+'<span>'+n.l+'</span></button>'}).join('')}
function go(id){S.sec=id;rNav();rCnt()}
function logout(){S.tok='';S.ak='';sessionStorage.removeItem('admin_token');localStorage.removeItem('admin_key');document.getElementById('shell').classList.add('hide');document.getElementById('loginOv').classList.remove('hid')}
function rCnt(){const c=document.getElementById('cnt');c.innerHTML='<div class="pg-t">Loading...</div>';const r={dashboard:rdash,users:rusr,invites:rinv,health:rhlt,logs:rlog};Promise.resolve((r[S.sec]||rdash)()).then(h=>c.innerHTML=h).catch(e=>c.innerHTML='<div class="pg-t">Error</div><p style="color:var(--rd)">'+esc(e.message)+'</p>')}
async function rdash(){let s;try{s=await api('GET','/admin/stats')}catch(e){return'<div class="pg-t">Dashboard</div><p style="color:var(--rd)">'+esc(e.message)+'</p>'}return'<div class="pg-t">Dashboard</div><div class="pg-d">Server overview</div><div class="sg"><div class="sc"><div class="sc-h"><span class="sc-l">Users</span><div class="sc-i" style="background:rgba(35,165,90,.15);color:var(--gr)">'+I.usr+'</div></div><div class="sc-v">'+(s.users?.total||0)+'</div><div class="sc-s">'+(s.users?.admins||0)+' admins</div></div><div class="sc"><div class="sc-h"><span class="sc-l">Messages</span><div class="sc-i" style="background:var(--ac-g);color:var(--ac)">'+I.log+'</div></div><div class="sc-v">'+(s.messages?.total||0).toLocaleString()+'</div><div class="sc-s">'+(s.messages?.last24h||0)+' today</div></div><div class="sc"><div class="sc-h"><span class="sc-l">Invites</span><div class="sc-i" style="background:rgba(240,178,50,.15);color:var(--yl)">'+I.inv+'</div></div><div class="sc-v">'+(s.invites?.total||0)+'</div><div class="sc-s">'+(s.invites?.active||0)+' active</div></div><div class="sc"><div class="sc-h"><span class="sc-l">Database</span><div class="sc-i" style="background:rgba(88,101,242,.15);color:var(--ac)">'+I.set+'</div></div><div class="sc-v">'+(s.storage?.database||'-')+'</div><div class="sc-s">PostgreSQL</div></div></div>'}
async function rusr(){let d;try{d=await api('GET','/admin/users')}catch(e){return'<div class="pg-t">Users</div><p style="color:var(--rd)">'+esc(e.message)+'</p>'}const u=d.users||[];return'<div class="pg-t">Users</div><div class="pg-d">'+u.length+' users</div><div class="fb"><input class="fs" id="us" placeholder="Search users..." oninput="fusr()"></div><div class="card"><div class="card-b np"><table class="tbl"><thead><tr><th>User</th><th>Email</th><th>Status</th><th>Role</th><th style="text-align:right">Actions</th></tr></thead><tbody id="ut">'+u.map(x=>'<tr data-n="'+esc((x.display_name||x.name||'').toLowerCase())+'" data-e="'+esc((x.email||'').toLowerCase())+'"><td><div style="display:flex;align-items:center;gap:8px"><div class="av" style="background:var(--ac)">'+esc((x.display_name||x.name||'U')[0].toUpperCase())+'</div><strong>'+esc(x.display_name||x.name)+'</strong></div></td><td style="font-size:12px;color:var(--tx-f)">'+esc(x.email||'-')+'</td><td>'+(x.is_blocked?'<span class="badge b-r">Blocked</span>':'<span class="badge b-g">Active</span>')+'</td><td>'+(x.is_admin?'<span class="badge b-a">Admin</span>':'<span class="badge b-m">User</span>')+'</td><td><div class="ag" style="justify-content:flex-end"><button class="ab" onclick="eusr(\''+esc(x.id)+'\',\''+esc(x.display_name||x.name)+'\','+x.is_admin+','+x.is_blocked+')">'+I.edt+'</button>'+(x.is_blocked?'<button class="ab" onclick="blk(\''+esc(x.id)+'\',false)">'+I.blk+'</button>':'<button class="ab danger" onclick="blk(\''+esc(x.id)+'\',true)">'+I.blk+'</button>')+(!x.is_admin?'<button class="ab danger" onclick="dusr(\''+esc(x.id)+'\')">'+I.del+'</button>':'')+'</div></td></tr>').join('')+'</tbody></table></div></div>'}
function fusr(){const q=(document.getElementById('us')?.value||'').toLowerCase();document.querySelectorAll('#ut tr').forEach(r=>{r.style.display=((r.dataset.n||'').includes(q)||(r.dataset.e||'').includes(q))?'':'none'})}
function eusr(id,name,ad,bl){openM('<div class="ml-h"><h3>Edit User</h3><button class="ml-c" onclick="closeM()">&times;</button></div><div class="ml-b"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div class="av" style="background:var(--ac);width:48px;height:48px;font-size:20px">'+esc(name[0].toUpperCase())+'</div><div style="font-size:16px;font-weight:700;color:#fff">'+esc(name)+'</div></div><div class="fg"><label class="fl">Name</label><input class="fi" id="eun" value="'+esc(name)+'"></div><div class="sr"><div class="si"><div class="sn">Admin</div><div class="sd">Administrator privileges</div></div><div class="sc2"><button class="tgl '+(ad?'on':'')+'" id="eua" onclick="this.classList.toggle(\'on\')"></button></div></div><div class="sr"><div class="si"><div class="sn">Blocked</div><div class="sd">Block from accessing</div></div><div class="sc2"><button class="tgl '+(bl?'on':'')+'" id="eub" onclick="this.classList.toggle(\'on\')"></button></div></div></div><div class="ml-f"><button class="btn btn-g" onclick="closeM()">Cancel</button><button class="btn btn-a" onclick="susr(\''+esc(id)+'\')">Save</button></div>')}
async function susr(id){try{await api('PUT','/admin/users/'+id+'/admin',{isAdmin:document.getElementById('eua')?.classList.contains('on')});await api('PUT','/admin/users/'+id+'/block',{blocked:document.getElementById('eub')?.classList.contains('on')});closeM();toast('Saved');rCnt()}catch(e){toast(e.message,'err')}}
async function blk(id,b){try{await api('PUT','/admin/users/'+id+'/block',{blocked:b});toast(b?'Blocked':'Unblocked');rCnt()}catch(e){toast(e.message,'err')}}
function dusr(id){openM('<div class="ml-h"><h3>Delete User</h3><button class="ml-c" onclick="closeM()">&times;</button></div><div class="ml-b"><p style="color:var(--tx-m)">Permanently delete this user?</p></div><div class="ml-f"><button class="btn btn-g" onclick="closeM()">Cancel</button><button class="btn btn-d" onclick="xdusr(\''+esc(id)+'\')">Delete</button></div>')}
async function xdusr(id){try{await api('DELETE','/admin/users/'+id);closeM();toast('Deleted');rCnt()}catch(e){toast(e.message,'err')}}
async function rinv(){let d;try{d=await api('GET','/admin/invites')}catch(e){return'<div class="pg-t">Invites</div><p style="color:var(--rd)">'+esc(e.message)+'</p>'}const inv=d.invites||[];return'<div class="pg-t">Invites</div><div class="pg-d">'+inv.length+' codes</div><div class="fb"><button class="btn btn-a" onclick="cinv()">'+I.inv+' Create Invite</button></div><div class="card"><div class="card-b np"><table class="tbl"><thead><tr><th>Code</th><th>Status</th><th>Expires</th><th style="text-align:right">Actions</th></tr></thead><tbody>'+inv.map(x=>{const u=x.is_used||x.used_by;const ex=new Date(x.expires_at)<new Date();return'<tr><td><code style="background:var(--bg-3);padding:2px 8px;border-radius:4px;font-family:var(--mn);font-size:12px;cursor:pointer" onclick="navigator.clipboard.writeText(\''+esc(x.code)+'\');toast(\'Copied!\',\'ok\')">'+esc(x.code)+'</code></td><td>'+(u?'<span class="badge b-m">Used</span>':ex?'<span class="badge b-r">Expired</span>':'<span class="badge b-g">Active</span>')+'</td><td style="font-size:12px;color:var(--tx-f)">'+new Date(x.expires_at).toLocaleDateString()+'</td><td><div class="ag" style="justify-content:flex-end"><button class="ab danger" onclick="dinv(\''+esc(x.id)+'\')">'+I.del+'</button></div></td></tr>'}).join('')+'</tbody></table></div></div>'}
function cinv(){openM('<div class="ml-h"><h3>Create Invite</h3><button class="ml-c" onclick="closeM()">&times;</button></div><div class="ml-b"><div class="fg"><label class="fl">Expires In</label><select class="fi" id="ie" style="appearance:auto"><option value="1">1 Day</option><option value="7" selected>7 Days</option><option value="30">30 Days</option></select></div></div><div class="ml-f"><button class="btn btn-g" onclick="closeM()">Cancel</button><button class="btn btn-a" onclick="xinv()">Create</button></div>')}
async function xinv(){try{await api('POST','/admin/invites',{expiresInDays:parseInt(document.getElementById('ie')?.value||7)});closeM();toast('Created');rCnt()}catch(e){toast(e.message,'err')}}
async function dinv(id){try{await api('DELETE','/admin/invites/'+id);toast('Deleted');rCnt()}catch(e){toast(e.message,'err')}}
async function rhlt(){const c=document.getElementById('cnt');async function rf(){try{const h=await api('GET','/admin/health');const cn=h.containers||[];const au=h.status==='healthy';document.getElementById('hc').innerHTML='<div class="pg-t">Health Check</div><div class="pg-d">'+new Date(h.timestamp).toLocaleTimeString()+'</div><div class="sg"><div class="sc"><div class="sc-h"><span class="sc-l">Status</span></div><div class="sc-v" style="color:'+(au?'var(--gr)':'var(--rd)')+'">'+h.status?.toUpperCase()+'</div><div class="sc-s">'+cn.filter(x=>x.status==='up').length+'/'+cn.length+' up</div></div></div><div class="hg">'+cn.map(x=>{const ic={'PostgreSQL':'🐘','Redis':'🔴','Messenger':'💬','Sync':'🔄','Files':'📁'};return'<div class="hi '+(x.status==='up'?'up':'dn')+'"><div class="ico">'+(ic[x.name]||'📦')+'</div><div class="nm">'+esc(x.name)+'</div><div class="st">'+(x.status==='up'?'Running':'Stopped')+'</div><div class="ind"></div></div>'}).join('')+'</div>'}catch(e){document.getElementById('hc').innerHTML='<div class="pg-t">Health Check</div><p style="color:var(--rd)">'+esc(e.message)+'</p>'}}await rf();setInterval(rf,10000);return'<div id="hc"><div class="pg-t">Health Check</div><div class="pg-d">Loading...</div></div>'}
async function rlog(){let d;try{d=await api('GET','/admin/logs')}catch(e){return'<div class="pg-t">Action Logs</div><p style="color:var(--rd)">'+esc(e.message)+'</p>'}const l=d.logs||[];return'<div class="pg-t">Action Logs</div><div class="pg-d">Admin action history</div><div class="card"><div class="card-b np"><table class="tbl"><thead><tr><th>Time</th><th>Admin</th><th>Action</th><th>Details</th></tr></thead><tbody>'+l.map(x=>'<tr><td style="font-size:12px;color:var(--tx-f);white-space:nowrap">'+new Date(x.created_at).toLocaleString()+'</td><td><strong>'+esc(x.admin_name||x.admin_id?.substring(0,8))+'</strong></td><td><span class="badge b-a">'+esc(x.action)+'</span></td><td style="font-size:12px;color:var(--tx-f)">'+esc(x.details||'-')+'</td></tr>').join('')+'</tbody></table></div></div>'}
document.getElementById('loginB').onclick=async()=>{const u=document.getElementById('loginU').value.trim(),p=document.getElementById('loginP').value,e=document.getElementById('loginE');e.textContent='';try{const d=await api('POST','/admin-auth/login',{name:u,password:p});S.tok=d.token;sessionStorage.setItem('admin_token',S.tok);document.getElementById('loginOv').classList.add('hid');document.getElementById('shell').classList.remove('hide');rNav();rCnt()}catch(er){e.textContent=er.message}};
['loginU','loginP'].forEach(i=>document.getElementById(i).addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginB').click()}));
(async()=>{
  const isValid = await checkAdminKey();
  if (isValid) return;
  
  if(!S.tok)return;
  try{await api('GET','/admin/health');document.getElementById('loginOv').classList.add('hid');document.getElementById('shell').classList.remove('hide');rNav();rCnt()}catch(e){sessionStorage.removeItem('admin_token');S.tok=''}})();
</script>
