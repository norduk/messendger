services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: messenger_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - messenger
      - sync
      - files
      - admin
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  messenger:
    build:
      context: .
      dockerfile: Dockerfile.messenger
    container_name: secure_messenger
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - HTTPS_PORT=${HTTPS_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - SYNC_URL=${SYNC_URL}
      - FILE_ENCRYPTION_KEY=${FILE_ENCRYPTION_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./ssl:/app/ssl
    depends_on:
      - postgres
      - redis
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    container_name: secure_messenger_sync
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - SYNC_PORT=${SYNC_PORT}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - redis
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  files:
    build:
      context: .
      dockerfile: Dockerfile.file
    container_name: secure_messenger_files
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${FILE_PORT}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - ENCRYPTION_KEY=${FILE_ENCRYPTION_KEY}
    volumes:
      - file_storage:/app/uploads
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: secure_messenger_admin
    env_file:
      - .env
    networks:
      - messenger-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: messenger_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - messenger-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  file_storage:

networks:
  messenger-network:
    driver: bridge
